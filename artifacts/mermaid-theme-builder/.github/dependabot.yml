version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      mermaid:
        patterns:
          - "mermaid"
    reviewers:
      - "OKHP3"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "mermaid"
        update-types: ["version-update:semver-major"]
