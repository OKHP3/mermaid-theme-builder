kind = "web"
previewPath = "/mermaid-theme-builder/"
title = "Mermaid Theme Builder"
version = "1.0.0"
id = "artifacts/mermaid-theme-builder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/mermaid-theme-builder/" ]
localPort = 18624

[services.development]
run = "pnpm run dev"

[services.production]
build = [ "pnpm", "run", "build" ]
publicDir = "dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18624"
BASE_PATH = "/mermaid-theme-builder/"
