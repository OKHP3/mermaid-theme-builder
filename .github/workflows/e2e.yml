name: E2E Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PORT: "4173"
      BASE_PATH: /mermaid-theme-builder/
      PLAYWRIGHT_BASE_URL: http://localhost:4173/mermaid-theme-builder/
      NODE_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Build
        run: pnpm build

      - name: Start preview server
        run: pnpm serve &

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:4173/mermaid-theme-builder/ && echo "Server ready" && break
            echo "Waiting... attempt $i"
            sleep 2
          done

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-failure-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: warn
