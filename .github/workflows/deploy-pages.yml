name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute base path
        id: base
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          # GitHub Pages serves a project page at /<repo>/. Override via the
          # `MTB_BASE_PATH` repo Variable for custom domains or root mounts.
          BASE_PATH="${MTB_BASE_PATH:-/${REPO_NAME}/}"
          echo "base_path=${BASE_PATH}" >> "$GITHUB_OUTPUT"
          echo "Resolved base path: ${BASE_PATH}"
        env:
          MTB_BASE_PATH: ${{ vars.MTB_BASE_PATH }}

      - name: Build Mermaid Theme Builder
        env:
          PORT: "18624"
          BASE_PATH: ${{ steps.base.outputs.base_path }}
        run: pnpm --filter @workspace/mermaid-theme-builder run build

      - name: Add SPA 404 fallback
        run: cp dist/public/index.html dist/public/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
