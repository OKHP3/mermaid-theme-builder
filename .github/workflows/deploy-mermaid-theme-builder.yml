name: Deploy Mermaid Theme Builder to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "artifacts/mermaid-theme-builder/**"
      - "lib/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/deploy-mermaid-theme-builder.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-mermaid-theme-builder
  cancel-in-progress: false

jobs:
  build:
    name: Build static bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @workspace/mermaid-theme-builder run typecheck

      - name: Build
        env:
          # PORT is required by vite.config.ts even for static builds (the
          # config reads it for the dev server config block). Any free port
          # is fine in CI; nothing actually listens.
          PORT: 5173
          BASE_PATH: /mermaid-theme-builder/
        run: pnpm --filter @workspace/mermaid-theme-builder run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/mermaid-theme-builder/dist/public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
