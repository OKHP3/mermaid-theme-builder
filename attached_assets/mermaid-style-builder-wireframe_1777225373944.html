<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mermaid Style Builder - Wireframe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; background: #FAFAFA; color: #1a1a1a; font-size: 14px; line-height: 1.5; }
.header { padding: 16px 24px; border-bottom: 1px solid #e0e0e0; background: #fff; display: flex; align-items: baseline; gap: 12px; }
.header h1 { font-size: 18px; font-weight: 600; }
.header .tagline { font-size: 13px; color: #666; }
.layout { display: grid; grid-template-columns: 380px 1fr; min-height: calc(100vh - 53px); }
.left { border-right: 1px solid #e0e0e0; overflow-y: auto; background: #fff; }
.right { overflow-y: auto; padding: 20px 24px; }
.section { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
.section-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.presets { display: flex; gap: 4px; flex-wrap: wrap; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
.preset-btn { padding: 5px 12px; font-size: 12px; border: 1px solid #d0d0d0; border-radius: 4px; background: #fff; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.preset-btn:hover { border-color: #888; }
.preset-btn.active { background: #E8F0FE; border-color: #4285f4; color: #1a73e8; font-weight: 500; }
.color-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.color-row input[type="color"] { width: 28px; height: 28px; border: 1px solid #ddd; padding: 0; cursor: pointer; border-radius: 3px; }
.color-row .label { flex: 1; min-width: 0; }
.color-row .label-name { font-size: 12px; font-weight: 500; }
.color-row .label-desc { font-size: 10px; color: #999; line-height: 1.2; }
.color-row .hex-input { width: 72px; font-size: 11px; font-family: 'Consolas', 'Monaco', monospace; text-align: center; padding: 3px 4px; border: 1px solid #ddd; border-radius: 3px; }
.text-input-row { margin-bottom: 6px; }
.text-input-row label { font-size: 12px; font-weight: 500; display: block; margin-bottom: 2px; }
.text-input-row input { width: 100%; font-size: 12px; padding: 5px 8px; border: 1px solid #ddd; border-radius: 3px; font-family: 'Consolas', monospace; }
.tabs { display: flex; border-bottom: 1px solid #e0e0e0; padding: 0 16px; background: #fafafa; }
.tab { padding: 8px 14px; font-size: 12px; border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent; color: #666; font-family: inherit; transition: all 0.15s; }
.tab:hover { color: #333; }
.tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 500; }
.output-block { padding: 12px 16px; }
.code-block { background: #f5f5f5; border: 1px solid #e8e8e8; border-radius: 6px; padding: 10px 12px; font-size: 11px; font-family: 'Consolas', 'Monaco', monospace; line-height: 1.5; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 240px; overflow-y: auto; position: relative; color: #333; }
.copy-btn { position: absolute; top: 6px; right: 6px; padding: 3px 10px; font-size: 11px; border: 1px solid #ccc; border-radius: 3px; background: #fff; cursor: pointer; font-family: inherit; }
.copy-btn:hover { background: #f0f0f0; }
.code-wrapper { position: relative; }
.mode-bar { display: flex; gap: 0; margin-bottom: 16px; border: 1px solid #d0d0d0; border-radius: 6px; overflow: hidden; width: fit-content; }
.mode-btn { padding: 8px 20px; font-size: 13px; border: none; background: #fff; cursor: pointer; font-family: inherit; border-right: 1px solid #d0d0d0; transition: all 0.15s; }
.mode-btn:last-child { border-right: none; }
.mode-btn:hover { background: #f5f5f5; }
.mode-btn.active { background: #1a1a1a; color: #fff; }
.textarea-container { margin-bottom: 16px; }
.textarea-container textarea { width: 100%; height: 140px; font-size: 12px; font-family: 'Consolas', monospace; padding: 10px; border: 1px solid #ddd; border-radius: 6px; resize: vertical; line-height: 1.5; }
.textarea-container .hint { font-size: 11px; color: #999; margin-top: 4px; }
.preview-section { margin-top: 16px; }
.preview-title { font-size: 12px; font-weight: 500; color: #666; margin-bottom: 10px; }
.node-preview-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.node-chip { display: inline-flex; align-items: center; justify-content: center; padding: 5px 14px; border-radius: 4px; font-size: 11px; font-weight: 500; min-width: 76px; text-align: center; }
.subgraph-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.subgraph-chip { flex: 1; min-width: 130px; padding: 8px 10px; border-radius: 5px; font-size: 11px; }
.diagram-preview { border: 1px solid #e0e0e0; border-radius: 6px; min-height: 200px; padding: 16px; background: #fff; display: flex; align-items: center; justify-content: center; }
.diagram-preview .placeholder { color: #bbb; font-size: 13px; text-align: center; }
.canvas-bg { padding: 14px; border-radius: 8px; border: 1px solid #e0e0e0; }
.footer { padding: 12px 16px; border-top: 1px solid #f0f0f0; }
.footer .dl-btn { padding: 6px 14px; font-size: 12px; border: 1px solid #d0d0d0; border-radius: 4px; background: #fff; cursor: pointer; font-family: inherit; }
.footer .dl-btn:hover { background: #f0f0f0; }
</style>
</head>
<body>

<div class="header">
  <h1>Mermaid Style Builder</h1>
  <span class="tagline">Define your brand. Style your diagrams.</span>
</div>

<div class="layout">
  <div class="left">
    <div class="presets" id="presetBar"></div>

    <div class="section">
      <div class="section-title">Brand colors</div>
      <div id="brandColors"></div>
    </div>

    <div class="section">
      <div class="section-title">Fills and surfaces</div>
      <div id="fillColors"></div>
    </div>

    <div class="section">
      <div class="section-title">Chrome and signals</div>
      <div id="chromeColors"></div>
    </div>

    <div class="section">
      <div class="section-title">Typography</div>
      <div id="typoSection"></div>
    </div>

    <div class="tabs" id="outputTabs"></div>
    <div class="output-block" id="outputBlock"></div>

    <div class="footer">
      <button class="dl-btn" id="downloadBtn">Download full system (.md)</button>
    </div>
  </div>

  <div class="right">
    <div class="mode-bar" id="modeBar"></div>
    <div class="textarea-container" id="diagramInput" style="display:none;">
      <textarea id="diagramCode" placeholder="Paste your Mermaid diagram code here..."></textarea>
      <div class="hint">Supports flowchart, sequenceDiagram, classDiagram, pie, timeline, mindmap, and more.</div>
    </div>
    <div class="preview-section" id="previewArea"></div>
  </div>
</div>

<script>
const PRESETS = {
  bfs: { name: "BFS Light", primaryDark: "#00205B", primaryMedium: "#003087", primaryDeep: "#002F86", accent: "#307FE2", supportMed: "#B3C1DB", supportLight: "#D6E5F9", neutral: "#D0D0CE", canvas: "#E7E6E6", panel: "#F2F2F2", signalRed: "#C8102E", borderGray: "#A7A8A9", medGray: "#75787B", slate: "#515151", fontFamily: "Segoe UI, Arial, Helvetica, sans-serif", fontSize: "14px" },
  overkill: { name: "OverKill Hill", primaryDark: "#111827", primaryMedium: "#1F2937", primaryDeep: "#374151", accent: "#D97706", supportMed: "#92400E", supportLight: "#FEF3C7", neutral: "#374151", canvas: "#0F172A", panel: "#1E293B", signalRed: "#DC2626", borderGray: "#6B7280", medGray: "#9CA3AF", slate: "#4B5563", fontFamily: "Segoe UI, Arial, Helvetica, sans-serif", fontSize: "14px" },
  gleefully: { name: "Glee-fully", primaryDark: "#2D6F7E", primaryMedium: "#D94F63", primaryDeep: "#2D6F7E", accent: "#D94F63", supportMed: "#F6F2EE", supportLight: "#FFF0ED", neutral: "#F6F2EE", canvas: "#FDFBF7", panel: "#F6F2EE", signalRed: "#D94F63", borderGray: "#B8B0A8", medGray: "#8A8279", slate: "#4A4540", fontFamily: "Trebuchet MS, Arial, sans-serif", fontSize: "14px" },
  corporate: { name: "Corporate Neutral", primaryDark: "#1A1A2E", primaryMedium: "#16213E", primaryDeep: "#0F3460", accent: "#E94560", supportMed: "#D4E4F7", supportLight: "#EDF2F7", neutral: "#E2E8F0", canvas: "#F7FAFC", panel: "#EDF2F7", signalRed: "#E94560", borderGray: "#A0AEC0", medGray: "#718096", slate: "#4A5568", fontFamily: "Segoe UI, Arial, sans-serif", fontSize: "14px" }
};

let tokens = { ...PRESETS.bfs };
let activePreset = "bfs";
let activeTab = "yaml";
let activeMode = "compose";

function lum(hex) { const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16); return (0.299*r + 0.587*g + 0.114*b) / 255; }
function tc(bg) { return lum(bg) > 0.55 ? "#333333" : "#FFFFFF"; }
function dk(hex, a=0.15) { const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16); const f = 1-a; return "#" + [r,g,b].map(c => Math.round(c*f).toString(16).padStart(2,"0")).join(""); }

function colorRow(key, label, desc) {
  const d = document.createElement("div"); d.className = "color-row";
  d.innerHTML = `<input type="color" value="${tokens[key]}" data-key="${key}"><div class="label"><div class="label-name">${label}</div>${desc ? `<div class="label-desc">${desc}</div>` : ""}</div><input type="text" class="hex-input" value="${tokens[key].toUpperCase()}" data-key="${key}">`;
  d.querySelector('input[type="color"]').addEventListener("input", e => { tokens[key] = e.target.value; d.querySelector(".hex-input").value = e.target.value.toUpperCase(); activePreset = null; render(); });
  d.querySelector(".hex-input").addEventListener("change", e => { const v = e.target.value; if (/^#[0-9A-Fa-f]{6}$/.test(v)) { tokens[key] = v; d.querySelector('input[type="color"]').value = v; activePreset = null; render(); } });
  return d;
}

function buildPresets() {
  const bar = document.getElementById("presetBar"); bar.innerHTML = "";
  Object.entries(PRESETS).forEach(([k, p]) => {
    const b = document.createElement("button"); b.className = "preset-btn" + (activePreset === k ? " active" : ""); b.textContent = p.name;
    b.onclick = () => { tokens = { ...PRESETS[k] }; activePreset = k; render(); };
    bar.appendChild(b);
  });
}

function buildColors() {
  const brand = document.getElementById("brandColors"); brand.innerHTML = "";
  brand.appendChild(colorRow("primaryDark", "Primary dark", "Brand anchor, borders, titles"));
  brand.appendChild(colorRow("primaryMedium", "Primary medium", "Secondary strokes"));
  brand.appendChild(colorRow("primaryDeep", "Primary deep", "Edge lines, cluster borders"));
  brand.appendChild(colorRow("accent", "Accent", "Highlight nodes (sparse)"));

  const fills = document.getElementById("fillColors"); fills.innerHTML = "";
  fills.appendChild(colorRow("supportMed", "Support medium", "System/app fills"));
  fills.appendChild(colorRow("supportLight", "Support light", "AI/overlay/scope fills"));
  fills.appendChild(colorRow("neutral", "Neutral gray", "Context fills, boundaries"));
  fills.appendChild(colorRow("canvas", "Canvas", "Diagram background"));

  const chrome = document.getElementById("chromeColors"); chrome.innerHTML = "";
  chrome.appendChild(colorRow("panel", "Panel gray", "Cluster interior"));
  chrome.appendChild(colorRow("borderGray", "Border gray", "Gate/control borders"));
  chrome.appendChild(colorRow("medGray", "Medium gray", "Boundary strokes"));
  chrome.appendChild(colorRow("slate", "Slate", "Dark infrastructure"));
  chrome.appendChild(colorRow("signalRed", "Signal red", "Warning/exclusion"));

  const typo = document.getElementById("typoSection"); typo.innerHTML = "";
  const ff = document.createElement("div"); ff.className = "text-input-row";
  ff.innerHTML = `<label>Font family</label><input type="text" value="${tokens.fontFamily}">`;
  ff.querySelector("input").addEventListener("change", e => { tokens.fontFamily = e.target.value; render(); });
  typo.appendChild(ff);
  const fs = document.createElement("div"); fs.className = "text-input-row";
  fs.innerHTML = `<label>Font size</label><input type="text" value="${tokens.fontSize}" style="width:80px;">`;
  fs.querySelector("input").addEventListener("change", e => { tokens.fontSize = e.target.value; render(); });
  typo.appendChild(fs);
}

function genYaml() {
  const t = tokens, stc = c => tc(c) === "#333333";
  return `---\nconfig:\n  theme: base\n  look: classic\n  themeVariables:\n    background: "${t.canvas}"\n    fontFamily: "${t.fontFamily}"\n    fontSize: "${t.fontSize}"\n    textColor: "#333333"\n    lineColor: "${t.primaryDeep}"\n    clusterBorder: "${t.primaryDeep}"\n    titleColor: "${t.primaryDark}"\n    primaryColor: "#FFFFFF"\n    primaryBorderColor: "${t.borderGray}"\n    primaryTextColor: "#333333"\n    secondaryColor: "${t.supportMed}"\n    secondaryBorderColor: "${t.primaryDark}"\n    secondaryTextColor: "${stc(t.supportMed) ? t.primaryDark : "#FFFFFF"}"\n    tertiaryColor: "${t.canvas}"\n    tertiaryBorderColor: "${t.medGray}"\n    tertiaryTextColor: "${stc(t.canvas) ? "#4D4D4D" : "#E5E5E5"}"\n    edgeLabelBackground: "#FFFFFF"\n    clusterBkg: "${t.panel}"\n    mainBkg: "#FFFFFF"\n    nodeBorder: "${t.borderGray}"\n    nodeTextColor: "#333333"\n---`;
}

function genInit() {
  const t = tokens, stc = c => tc(c) === "#333333";
  return `%%{init: {"theme":"base","themeVariables":{"background":"${t.canvas}","fontFamily":"${t.fontFamily}","fontSize":"${t.fontSize}","textColor":"#333333","lineColor":"${t.primaryDeep}","clusterBorder":"${t.primaryDeep}","titleColor":"${t.primaryDark}","primaryColor":"#FFFFFF","primaryBorderColor":"${t.borderGray}","primaryTextColor":"#333333","secondaryColor":"${t.supportMed}","secondaryBorderColor":"${t.primaryDark}","tertiaryColor":"${t.canvas}","tertiaryBorderColor":"${t.medGray}","edgeLabelBackground":"#FFFFFF","clusterBkg":"${t.panel}","mainBkg":"#FFFFFF","nodeBorder":"${t.borderGray}","nodeTextColor":"#333333"}}}%%`;
}

function genClassDefs() {
  const t = tokens, stc = c => tc(c) === "#333333";
  return [
    `classDef primary     fill:${t.neutral},stroke:${t.primaryDark},stroke-width:1.5px,color:${stc(t.neutral) ? "#4D4D4D" : "#FFFFFF"}`,
    `classDef secondary   fill:${t.supportMed},stroke:${t.primaryDark},stroke-width:1.5px,color:${stc(t.supportMed) ? t.primaryDark : "#FFFFFF"}`,
    `classDef tertiary    fill:${t.supportLight},stroke:${t.primaryMedium},stroke-width:1.5px,color:${stc(t.supportLight) ? t.primaryDark : "#FFFFFF"}`,
    `classDef platform    fill:#FFFFFF,stroke:${t.primaryDark},stroke-width:1.5px,color:#4D4D4D`,
    `classDef boundary    fill:${t.neutral},stroke:${t.medGray},stroke-width:1.5px,color:${stc(t.neutral) ? "#4D4D4D" : "#CCCCCC"}`,
    `classDef actor       fill:#FFFFFF,stroke:${t.primaryDark},stroke-width:1.5px,color:${t.primaryDark}`,
    `classDef gate        fill:#FFFFFF,stroke:${t.borderGray},stroke-width:1px,stroke-dasharray:4 3,color:#4D4D4D`,
    `classDef control     fill:#FFFFFF,stroke:${t.borderGray},stroke-width:1px,color:#4D4D4D`,
    `classDef log         fill:#FFFFFF,stroke:${t.borderGray},stroke-width:1px,color:#4D4D4D`,
    `classDef question    fill:#FFFFFF,stroke:${t.primaryDark},stroke-width:1px,stroke-dasharray:6 4,color:${t.primaryDark}`,
    `classDef accent      fill:${t.accent},stroke:${dk(t.accent)},stroke-width:1.4px,color:${tc(t.accent)}`,
    `classDef deepBlue    fill:${t.primaryDeep},stroke:${t.primaryDeep},stroke-width:1.4px,color:#FFFFFF`,
    `classDef slate       fill:${t.slate},stroke:${dk(t.slate)},stroke-width:1.4px,color:#FFFFFF`,
    `classDef dbStrong    stroke-width:1.8px`,
    `classDef scope       fill:${t.supportLight},stroke:${t.primaryDark},stroke-width:2px,color:${stc(t.supportLight) ? t.primaryDark : "#FFFFFF"}`,
    `classDef outOfScope  fill:#FFFFFF,stroke:${t.signalRed},stroke-width:2px,color:${t.signalRed}`,
    `classDef redDash     fill:${t.signalRed},stroke:${dk(t.signalRed)},stroke-dasharray:3 2,stroke-width:1.5px,color:#FFFFFF`,
    ``,
    `linkStyle default stroke:${t.primaryDeep},stroke-width:1.3px`
  ].join("\n");
}

function genSubgraph() {
  const t = tokens, stc = c => tc(c) === "#333333";
  return [
    `Tier 1 (major boundary):\n  style ID fill:${t.neutral},stroke:${t.primaryDark},stroke-width:2px,color:${stc(t.neutral) ? "#4D4D4D" : "#CCCCCC"}`,
    `\nTier 2 (system tenant):\n  style ID fill:${t.supportMed},stroke:${t.primaryDark},stroke-width:2px,color:${stc(t.supportMed) ? t.primaryDark : "#FFFFFF"}`,
    `\nTier 2b (light system):\n  style ID fill:${t.supportLight},stroke:${t.primaryMedium},stroke-width:2px,color:${stc(t.supportLight) ? t.primaryDark : "#FFFFFF"}`,
    `\nTier 3 (interior group):\n  style ID fill:${t.neutral},stroke:${t.medGray},stroke-width:2px,color:${stc(t.neutral) ? "#4D4D4D" : "#CCCCCC"}`,
    `\nTier 3b (chrome group):\n  style ID fill:#FFFFFF,stroke:${t.borderGray},stroke-width:2px,color:#4D4D4D`,
    `\nTier 4 (environment):\n  style ID fill:${t.panel},stroke:${t.primaryDeep},stroke-width:1.5px,color:${stc(t.panel) ? t.primaryDeep : "#FFFFFF"}`
  ].join("\n");
}

function buildTabs() {
  const bar = document.getElementById("outputTabs"); bar.innerHTML = "";
  const tabs = [["yaml","YAML"],["init","Init directive"],["classdef","classDef"],["subgraph","Subgraph tiers"]];
  tabs.forEach(([id, label]) => {
    const b = document.createElement("button"); b.className = "tab" + (activeTab === id ? " active" : ""); b.textContent = label;
    b.onclick = () => { activeTab = id; render(); };
    bar.appendChild(b);
  });
}

function buildOutput() {
  const block = document.getElementById("outputBlock"); block.innerHTML = "";
  let content = "";
  if (activeTab === "yaml") content = genYaml();
  else if (activeTab === "init") content = genInit();
  else if (activeTab === "classdef") content = genClassDefs();
  else if (activeTab === "subgraph") content = genSubgraph();

  const wrapper = document.createElement("div"); wrapper.className = "code-wrapper";
  wrapper.innerHTML = `<div class="code-block">${escHtml(content)}</div><button class="copy-btn" onclick="navigator.clipboard.writeText(\`${content.replace(/`/g,"\\`").replace(/\$/g,"\\$")}\`).then(()=>{this.textContent='Copied';setTimeout(()=>this.textContent='Copy',1500)})">Copy</button>`;
  block.appendChild(wrapper);
}

function escHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function buildModes() {
  const bar = document.getElementById("modeBar"); bar.innerHTML = "";
  [["compose","Compose"],["apply","Apply"],["extract","Extract"]].forEach(([id,label]) => {
    const b = document.createElement("button"); b.className = "mode-btn" + (activeMode === id ? " active" : ""); b.textContent = label;
    b.onclick = () => { activeMode = id; render(); };
    bar.appendChild(b);
  });
  document.getElementById("diagramInput").style.display = activeMode === "compose" ? "none" : "block";
}

function buildPreview() {
  const area = document.getElementById("previewArea"); area.innerHTML = "";
  const t = tokens;

  if (activeMode === "compose") {
    const title1 = document.createElement("div"); title1.className = "preview-title"; title1.textContent = "Node class preview"; area.appendChild(title1);
    const canvasBg = document.createElement("div"); canvasBg.className = "canvas-bg"; canvasBg.style.background = t.canvas;
    const grid = document.createElement("div"); grid.className = "node-preview-grid";
    const stc = c => tc(c) === "#333333";
    const nodes = [
      { label: "primary", fill: t.neutral, stroke: t.primaryDark, color: stc(t.neutral) ? "#4D4D4D" : "#FFF" },
      { label: "secondary", fill: t.supportMed, stroke: t.primaryDark, color: stc(t.supportMed) ? t.primaryDark : "#FFF" },
      { label: "tertiary", fill: t.supportLight, stroke: t.primaryMedium, color: stc(t.supportLight) ? t.primaryDark : "#FFF" },
      { label: "platform", fill: "#FFFFFF", stroke: t.primaryDark, color: "#4D4D4D" },
      { label: "actor", fill: "#FFFFFF", stroke: t.primaryDark, color: t.primaryDark },
      { label: "boundary", fill: t.neutral, stroke: t.medGray, color: stc(t.neutral) ? "#4D4D4D" : "#CCC" },
      { label: "gate", fill: "#FFFFFF", stroke: t.borderGray, color: "#4D4D4D", dashed: true },
      { label: "control", fill: "#FFFFFF", stroke: t.borderGray, color: "#4D4D4D" },
      { label: "question", fill: "#FFFFFF", stroke: t.primaryDark, color: t.primaryDark, dashed: true },
      { label: "accent", fill: t.accent, stroke: dk(t.accent), color: tc(t.accent) },
      { label: "deepBlue", fill: t.primaryDeep, stroke: t.primaryDeep, color: "#FFF" },
      { label: "slate", fill: t.slate, stroke: dk(t.slate), color: "#FFF" },
      { label: "scope", fill: t.supportLight, stroke: t.primaryDark, color: stc(t.supportLight) ? t.primaryDark : "#FFF", sw: "2px" },
      { label: "outOfScope", fill: "#FFFFFF", stroke: t.signalRed, color: t.signalRed, sw: "2px" },
      { label: "redDash", fill: t.signalRed, stroke: dk(t.signalRed), color: "#FFF", dashed: true },
    ];
    nodes.forEach(n => {
      const chip = document.createElement("div"); chip.className = "node-chip";
      chip.style.cssText = `background:${n.fill};border:${n.sw||"1.5px"} ${n.dashed?"dashed":"solid"} ${n.stroke};color:${n.color};`;
      chip.textContent = n.label;
      grid.appendChild(chip);
    });
    canvasBg.appendChild(grid);
    area.appendChild(canvasBg);

    const title2 = document.createElement("div"); title2.className = "preview-title"; title2.textContent = "Subgraph tier preview"; title2.style.marginTop = "16px"; area.appendChild(title2);
    const sgrid = document.createElement("div"); sgrid.className = "subgraph-preview";
    [
      { label: "Tier 1", fill: t.neutral, stroke: t.primaryDark, color: stc(t.neutral) ? "#4D4D4D" : "#CCC" },
      { label: "Tier 2", fill: t.supportMed, stroke: t.primaryDark, color: stc(t.supportMed) ? t.primaryDark : "#FFF" },
      { label: "Tier 4", fill: t.panel, stroke: t.primaryDeep, color: stc(t.panel) ? t.primaryDeep : "#FFF" }
    ].forEach(s => {
      const chip = document.createElement("div"); chip.className = "subgraph-chip";
      chip.style.cssText = `background:${s.fill};border:2px solid ${s.stroke};color:${s.color};`;
      chip.textContent = s.label;
      sgrid.appendChild(chip);
    });
    area.appendChild(sgrid);
  } else {
    const dp = document.createElement("div"); dp.className = "diagram-preview"; dp.id = "diagramPreview";
    dp.innerHTML = `<div class="placeholder">Paste a Mermaid diagram above to see a styled preview</div>`;
    area.appendChild(dp);
  }
}

function render() {
  buildPresets();
  buildColors();
  buildTabs();
  buildOutput();
  buildModes();
  buildPreview();
}

render();
