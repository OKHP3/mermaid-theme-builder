<svg width="512" height="512" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- OverKill Hill P3 — Mermaid Theme Builder app icon -->
  <!-- Concept: Forked Flow — one input diagram node forks into two themed outputs -->
  <!-- The orange bottom-right node represents the "themed" governed output -->
  <rect width="100" height="100" rx="18" fill="#111827"/>
  <!-- Input node (top centre) -->
  <rect x="29" y="9" width="42" height="16" rx="4" fill="#e5e7eb"/>
  <!-- Fork connectors: stem then left + right branches -->
  <path d="M 50 25 L 50 55 M 50 55 L 23 71 M 50 55 L 77 71"
        stroke="#c46a2c" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Left output node (original / untouched) -->
  <rect x="4" y="71" width="38" height="16" rx="4" fill="#e5e7eb"/>
  <!-- Right output node (themed — OKH rust-orange) -->
  <rect x="58" y="71" width="38" height="16" rx="4" fill="#c46a2c"/>
</svg>
